<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  :root{
    --ink:#0E1F16;
    --green:#1E4D33;
    --green-dk:#143524;
    --green-lt:#3E7A52;
    --grass:#2F7D4F;
    --grass-dk:#266a43;
    --gold:#E8B33D;
    --gold-dk:#C9931F;
    --sand:#F3EEDF;
    --paper:#FBFAF5;
    --line:rgba(14,31,22,0.12);
    --muted:#5E6F64;
    --red:#D6573B;
  }
  html,body{height:100%;}
  body{
    font-family:'Inter',sans-serif;color:var(--ink);background:var(--green-dk);
    overscroll-behavior:none;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:560px;margin:0 auto;min-height:100%;background:var(--paper);
    display:flex;flex-direction:column;box-shadow:0 0 40px rgba(0,0,0,0.3);}

  /* ===== TOP BAR ===== */
  .topbar{background:var(--green-dk);padding:12px 16px 0;position:sticky;top:0;z-index:30;}
  .brand{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .brand h1{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:19px;
    letter-spacing:0.04em;color:var(--sand);text-transform:uppercase;display:flex;align-items:center;gap:8px;}
  .brand h1 .dot{width:9px;height:9px;border-radius:50%;background:var(--gold);}
  .counter{font-family:'DM Mono',monospace;font-size:12px;color:var(--gold);}

  /* pill scroller */
  .pills{display:flex;gap:7px;overflow-x:auto;padding-bottom:12px;scrollbar-width:none;}
  .pills::-webkit-scrollbar{display:none;}
  .pill{flex:0 0 auto;padding:9px 15px;border-radius:20px;border:1.5px solid rgba(232,179,61,0.3);
    background:rgba(255,255,255,0.04);color:rgba(243,238,223,0.75);font-size:13.5px;font-weight:600;
    cursor:pointer;white-space:nowrap;transition:all .15s;}
  .pill:active{transform:scale(0.95);}
  .pill.on{background:var(--gold);border-color:var(--gold);color:var(--green-dk);}

  /* ===== HEADER CARD ===== */
  .head{padding:16px 18px 12px;background:var(--paper);border-bottom:1px solid var(--line);}
  .head .cat{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.14em;
    text-transform:uppercase;color:var(--gold-dk);margin-bottom:3px;}
  .head h2{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:30px;
    color:var(--green);line-height:1;text-transform:uppercase;letter-spacing:0.01em;}
  .head p{margin-top:7px;font-size:13.5px;line-height:1.5;color:var(--muted);}

  /* ===== HAND SWITCH ===== */
  .hand-switch{display:flex;background:rgba(255,255,255,0.08);border:1px solid rgba(232,179,61,0.35);
    border-radius:18px;padding:3px;}
  .hand-switch button{padding:6px 12px;border:none;background:none;border-radius:15px;
    font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:13px;letter-spacing:0.04em;
    text-transform:uppercase;color:rgba(243,238,223,0.7);cursor:pointer;transition:all .15s;}
  .hand-switch button.on{background:var(--gold);color:var(--green-dk);}

  /* ===== DIAGRAM ===== */
  .stage{margin:14px 18px 0;border-radius:14px;overflow:hidden;border:1px solid var(--line);
    box-shadow:0 4px 14px rgba(14,31,22,0.08);}
  svg.diagram{display:block;width:100%;height:auto;background:#dceede;}
  svg.slope-inset{border-top:2px dashed rgba(20,53,36,0.18);background:#eef5ec;}

  /* ===== SPEC STRIP ===== */
  .specs{margin:14px 18px 0;display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .spec{background:var(--sand);border-radius:11px;padding:11px 13px;}
  .spec.full{grid-column:1/-1;}
  .spec .k{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.1em;
    text-transform:uppercase;color:var(--gold-dk);margin-bottom:3px;}
  .spec .v{font-size:14.5px;font-weight:600;color:var(--ink);line-height:1.25;}

  /* weight mini bar — fill anchored LEFT = LEAD (matches top-down) */
  .wbar{height:9px;border-radius:5px;background:#d8d0bb;overflow:hidden;margin-top:7px;position:relative;display:flex;}
  .wbar .lead{background:linear-gradient(90deg,var(--green-lt),var(--green-dk));height:100%;transition:width .4s;}
  .wlabels{display:flex;justify-content:space-between;margin-top:5px;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);}

  /* grip pressure meter — light → firm */
  .pbar{height:9px;border-radius:5px;margin-top:7px;position:relative;
    background:linear-gradient(90deg,#cfe6cf,#E2C882,#C9931F,#b5471f);}
  .pfill{position:absolute;top:-3px;width:3px;height:15px;border-radius:2px;background:var(--ink);
    transform:translateX(-50%);transition:left .4s;box-shadow:0 0 0 2px rgba(255,255,255,0.7);}
  .plabels{display:flex;justify-content:space-between;margin-top:7px;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);}
  .plabels span:nth-child(2){color:var(--ink);font-weight:600;}

  /* ===== CONTROL ROWS (shape / flight / lie) ===== */
  .controls{margin:14px 18px 0;display:flex;flex-direction:column;gap:8px;}
  .ctl-row{display:flex;align-items:center;gap:10px;}
  .ctl-row.hidden{display:none;}
  .ctl-lbl{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.12em;
    text-transform:uppercase;color:var(--gold-dk);flex:0 0 42px;}
  .ctl-btns{display:flex;gap:6px;flex:1;}
  .ctl{flex:1;padding:9px 4px;border:1.5px solid var(--line);background:var(--paper);border-radius:9px;
    font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:13.5px;letter-spacing:0.02em;
    text-transform:uppercase;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap;}
  .ctl-btns.five .ctl{font-size:12px;padding:9px 2px;}
  .ctl:active{transform:scale(0.95);}
  .ctl.on{background:var(--gold);border-color:var(--gold);color:var(--green-dk);}

  /* ===== KEY THOUGHT ===== */
  .think{margin:12px 18px 0;background:var(--green);border-radius:13px;padding:14px 16px;
    border-left:4px solid var(--gold);}
  .think .lbl{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.15em;
    text-transform:uppercase;color:var(--gold);margin-bottom:5px;}
  .think p{color:var(--sand);font-size:14px;line-height:1.55;font-weight:500;}

  /* ===== NAV ===== */
  .nav{margin:14px 18px 22px;display:flex;gap:10px;}
  .nav button{flex:1;padding:15px;border:none;border-radius:13px;background:var(--green-dk);
    color:var(--sand);font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:16px;
    letter-spacing:0.05em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;
    justify-content:center;gap:8px;transition:transform .12s;}
  .nav button:active{transform:scale(0.96);}
  .nav button:disabled{opacity:0.35;}
  .nav .arrow{font-size:18px;}

  @media(min-width:560px){
    .wrap{margin:20px auto;min-height:calc(100% - 40px);border-radius:18px;overflow:hidden;}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand">
      <h1><span class="dot"></span>Swing Guide</h1>
      <div class="hand-switch">
        <button id="h-R" class="on" onclick="setHand('R')">Righty</button>
        <button id="h-L" onclick="setHand('L')">Lefty</button>
      </div>
    </div>
    <div class="pills" id="pills"></div>
  </div>

  <div class="head">
    <div class="cat" id="cat"></div>
    <h2 id="title"></h2>
    <p id="desc"></p>
  </div>

  <div class="controls">
    <div class="ctl-row" id="row-shape">
      <span class="ctl-lbl">Shape</span>
      <div class="ctl-btns">
        <button id="sh-straight" class="ctl on" onclick="setShape('straight')">Straight</button>
        <button id="sh-draw" class="ctl" onclick="setShape('draw')">Draw</button>
        <button id="sh-fade" class="ctl" onclick="setShape('fade')">Fade</button>
      </div>
    </div>
    <div class="ctl-row" id="row-traj">
      <span class="ctl-lbl">Flight</span>
      <div class="ctl-btns">
        <button id="tr-normal" class="ctl on" onclick="setTraj('normal')">Normal</button>
        <button id="tr-low" class="ctl" onclick="setTraj('low')">Low</button>
        <button id="tr-high" class="ctl" onclick="setTraj('high')">High</button>
      </div>
    </div>
    <div class="ctl-row" id="row-slope">
      <span class="ctl-lbl">Lie</span>
      <div class="ctl-btns five">
        <button id="sl-flat" class="ctl on" onclick="setSlope('flat')">Flat</button>
        <button id="sl-uphill" class="ctl" onclick="setSlope('uphill')">Uphill</button>
        <button id="sl-downhill" class="ctl" onclick="setSlope('downhill')">Downhill</button>
        <button id="sl-above" class="ctl" onclick="setSlope('above')">Above</button>
        <button id="sl-below" class="ctl" onclick="setSlope('below')">Below</button>
      </div>
    </div>
  </div>

  <div class="stage">
    <svg class="diagram" id="svg-top" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg"></svg>
    <svg class="diagram slope-inset" id="svg-slope" viewBox="0 0 400 170" xmlns="http://www.w3.org/2000/svg" style="display:none"></svg>
  </div>

  <div class="specs">
    <div class="spec"><div class="k">Stance Width</div><div class="v" id="s-width"></div></div>
    <div class="spec"><div class="k">Ball Position</div><div class="v" id="s-ball"></div></div>
    <div class="spec"><div class="k">Attack Angle</div><div class="v" id="s-attack"></div></div>
    <div class="spec"><div class="k">Spine / Lean</div><div class="v" id="s-tilt"></div></div>
    <div class="spec full">
      <div class="k">Weight at Address</div>
      <div class="v" id="s-weight"></div>
      <div class="wbar"><div class="lead" id="wbar-fill"></div></div>
      <div class="wlabels"><span id="wl-left">◂ target · LEAD</span><span id="wl-right">TRAIL</span></div>
    </div>
    <div class="spec full">
      <div class="k">Grip &amp; Pressure</div>
      <div class="v" id="s-grip"></div>
      <div class="pbar"><div class="pfill" id="pbar-fill"></div></div>
      <div class="plabels"><span>Light</span><span id="p-val"></span><span>Firm</span></div>
    </div>
  </div>

  <div class="think">
    <div class="lbl">Key Thought</div>
    <p id="think"></p>
  </div>

  <div class="nav">
    <button id="prev" onclick="step(-1)"><span class="arrow">‹</span> Prev</button>
    <button id="next" onclick="step(1)">Next <span class="arrow">›</span></button>
  </div>
</div>

  downhill:{ name:"Downhill", profile:"updown", up:false, dBall:-6, dWeightTrail:-14, spine:12, dPress:+1, gripNote:"hold firm, stay connected",
    aim:"aim left", club:"−1 club",
    s_tilt:"Match shoulders to slope (lead low)",
    think:"Set your shoulders down the slope with weight on the low (lead) foot and the ball back. Chase the club down the hill — it flies lower, so take less club and aim a little left." },
  above:{ name:"Ball Above", profile:"cross", dir:"above", dBall:-2, dWeightTrail:0, spine:0, dPress:+1, gripNote:"choke down the handle",
    aim:"aim right", club:"choke down",
    s_tilt:"Stand tall, weight toward toes",
    think:"Ball above your feet sits closer, so choke down, stand a touch taller, and swing flatter around your body. It curves left — aim right." },
  below:{ name:"Ball Below", profile:"cross", dir:"below", dBall:-2, dWeightTrail:0, spine:0, dPress:+1, gripNote:"grip full length, firm",
    aim:"aim left", club:"full length",
    s_tilt:"More knee flex, weight on heels",
    think:"Ball below your feet is farther away — hold the club at full length, add knee flex, and stay down through impact. It curves right — aim left." }
};

let idx = 0;
let hand = 'R';            // 'R' right-handed, 'L' left-handed
let shape = 'straight';
let traj = 'normal';
let slope = 'flat';

/* Mirror left/right wording for a left-handed player. */
function hw(str){
  if(hand==='R' || !str) return str;
  return str
    .replace(/\bright\b/g,'\u0001').replace(/\bleft\b/g,'right').replace(/\u0001/g,'left')
    .replace(/\bRIGHT\b/g,'\u0001').replace(/\bLEFT\b/g,'RIGHT').replace(/\u0001/g,'LEFT')
    .replace(/\bRight\b/g,'\u0001').replace(/\bLeft\b/g,'Right').replace(/\u0001/g,'Left');
}
const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));

/* Build the effective shot: base → shape → trajectory → slope. */
function effShot(){
  const base = SHOTS[idx];
  const o = Object.assign({}, base);
  let think = base.think;
  o.shapeLabel = null; o.trajLabel = null; o.slopeLabel = null; o.slopeProfile = null;

  if(base.shapeable && shape!=='straight'){
    const d=SHAPES[shape];
    o.openness = d.openness;
    o.ballPos  = clamp(o.ballPos + d.ballDelta, 0, 100);
    o.shapeLabel = d.label;
    think = d.think;
  }
  if(base.trajable && traj!=='normal'){
    const d=TRAJ[traj];
    o.ballPos = clamp(o.ballPos + d.dBall, 0, 100);
    o.weightTrail = clamp(o.weightTrail + d.dWeightTrail, 15, 85);
    o.trajLabel = d.label;
    think = d.think;
  }
  if(base.slopeable && slope!=='flat'){
    const d=SLOPES[slope];
    o.ballPos = clamp(o.ballPos + d.dBall, 0, 100);
    o.weightTrail = clamp(o.weightTrail + d.dWeightTrail, 15, 85);
    o.spineTilt = d.spine;
    o.s_tilt = d.s_tilt;
    o.slopeLabel = `${d.name.toUpperCase()} · ${d.club} · ${d.aim}`;
    o.slopeProfile = d;
    think = d.think;
  }
  // ---- grip pressure + note (base, adjusted by flight/lie) ----
  let press = base.gripPressure;
  let gripNotes = [];
  if(base.trajable && traj!=='normal'){ const d=TRAJ[traj]; press+=(d.dPress||0); if(d.gripNote) gripNotes.push(d.gripNote); }
  if(base.slopeable && slope!=='flat'){ const d=SLOPES[slope]; press+=(d.dPress||0); if(d.gripNote) gripNotes.push(d.gripNote); }
  o.gripPressureEff = clamp(press,1,10);
  o.gripEff = base.grip + (gripNotes.length ? '  ·  ' + gripNotes.join('; ') : '');

  o.think = think;
  return o;
}

const pillsEl = document.getElementById('pills');
SHOTS.forEach((s,i)=>{
  const b=document.createElement('button');
  b.className='pill'+(i===0?' on':'');
  b.textContent=s.short;
  b.onclick=()=>{ idx=i; resetMods(); render(); };
  pillsEl.appendChild(b);
});

function resetMods(){ shape='straight'; traj='normal'; slope='flat'; }
function setHand(h){ hand=h;
  document.getElementById('h-R').classList.toggle('on',h==='R');
  document.getElementById('h-L').classList.toggle('on',h==='L');
  render();
}
function setShape(v){ shape=v; render(); }
function setTraj(v){ traj=v; render(); }
function setSlope(v){ slope=v; render(); }
function step(d){ idx=Math.max(0,Math.min(SHOTS.length-1,idx+d)); resetMods(); render(); }

/* ============ HELPERS ============ */
const NS="http://www.w3.org/2000/svg";
function el(tag,attrs){ const e=document.createElementNS(NS,tag); for(const k in attrs) e.setAttribute(k,attrs[k]); return e; }
function txt(x,y,str,attrs){ const t=el('text',Object.assign({x,y},attrs)); t.textContent=str; return t; }

/* ============ TOP-DOWN VIEW ============ */
/* Looking straight down. Target is to the RIGHT. Ball sits on the target line.
   Player stands below the line (behind ball). Lead foot = right, trail foot = left. */
function drawTop(s){
  const svg=document.getElementById('svg-top');
  svg.innerHTML='';
  const W=400,H=300;
  const lineY=120;                      // target line (ball-to-target) height
  const cx=200;                         // center of stance
  const maxHalf=120;                    // max half stance width in px
  const half=maxHalf*s.width;           // half stance width
  const footY=190;                      // baseline foot depth (square)
  const open=s.openness;                // degrees of stance openness

  // grass background
  svg.appendChild(el('rect',{x:0,y:0,width:W,height:H,fill:'#cfe6cf'}));
  // mowing stripes
  for(let i=0;i<8;i++){
    svg.appendChild(el('rect',{x:i*50,y:0,width:25,height:H,fill:'#c6e0c6',opacity:0.5}));
  }

  // Handedness: lead/target side. Righty → lead & target on the LEFT (sideSign −1).
  // Lefty → lead & target on the RIGHT (sideSign +1).
  const sideSign = (hand==='R') ? -1 : 1;

  // TARGET LINE
  svg.appendChild(el('line',{x1:30,y1:lineY,x2:372,y2:lineY,stroke:'#1E4D33',
    'stroke-width':2,'stroke-dasharray':'2 5','stroke-linecap':'round',opacity:0.55}));
  // target flag on the lead side
  const fx = (sideSign<0) ? 22 : 378;
  const flagDir = (sideSign<0) ? -1 : 1;     // flag points further toward target edge
  svg.appendChild(el('line',{x1:fx,y1:lineY-22,x2:fx,y2:lineY+4,stroke:'#143524','stroke-width':2.5}));
  svg.appendChild(el('path',{d:`M${fx},${lineY-22} L${fx+flagDir*14},${lineY-17} L${fx},${lineY-12} Z`,fill:'#D6573B'}));
  svg.appendChild(txt(fx-flagDir*30,lineY-26,'TARGET',{'font-family':'DM Mono,monospace','font-size':9,
    fill:'#143524','letter-spacing':'0.1em','text-anchor':'middle'}));

  // FEET — LEAD foot on the target side, TRAIL foot opposite.
  // Signed openness: open (+) drops the LEAD foot back toward the viewer;
  // closed (−) drops the TRAIL foot back. Magnitude m sets the angle.
  const leadX=cx+sideSign*half, trailX=cx-sideSign*half;
  const m=Math.abs(open);
  const leadY  = open>0 ? footY + m*0.9 : footY - m*0.35;
  const trailY = open<0 ? footY + m*0.9 : footY - m*0.35;

  // stance line (foot-line) — angled when open or closed
  svg.appendChild(el('line',{x1:leadX,y1:leadY,x2:trailX,y2:trailY,stroke:'#1E4D33',
    'stroke-width':1.5,'stroke-dasharray':'4 4',opacity:0.35}));

  // shoe drawing helper (oval pointing UP toward the ball line, flared by angle)
  function shoe(x,y,flareDeg,lead){
    const g=el('g',{transform:`translate(${x},${y}) rotate(${flareDeg})`});
    // sole shadow
    g.appendChild(el('ellipse',{cx:0,cy:3,rx:15,ry:30,fill:'rgba(0,0,0,0.12)'}));
    // shoe body
    g.appendChild(el('ellipse',{cx:0,cy:0,rx:14,ry:28,fill: lead?'#244a36':'#2c5a40'}));
    // toe cap
    g.appendChild(el('ellipse',{cx:0,cy:-16,rx:11,ry:12,fill:'rgba(255,255,255,0.12)'}));
    // laces
    for(let i=-1;i<=1;i++) g.appendChild(el('line',{x1:-6,y1:i*5,x2:6,y2:i*5,stroke:'rgba(255,255,255,0.35)','stroke-width':1.2}));
    return g;
  }
  // lead foot flares toward target (toward the lead side); trail flares for closed stance
  const leadFlare=18+Math.max(0,open)*0.4;
  const trailFlare=open<0 ? 8+m*0.3 : (open>20?8:0);
  svg.appendChild(shoe(leadX,leadY,sideSign*leadFlare,true));
  svg.appendChild(shoe(trailX,trailY,-sideSign*trailFlare,false));

  // foot labels + weight %
  svg.appendChild(txt(trailX,trailY+46,'TRAIL',{'font-family':'DM Mono,monospace','font-size':9,
    fill:'#143524','text-anchor':'middle','letter-spacing':'0.08em'}));
  svg.appendChild(txt(trailX,trailY+58,s.weightTrail+'%',{'font-family':'DM Mono,monospace','font-size':11,
    fill:'#1E4D33','font-weight':'700','text-anchor':'middle'}));
  svg.appendChild(txt(leadX,leadY+46,'LEAD',{'font-family':'DM Mono,monospace','font-size':9,
    fill:'#143524','text-anchor':'middle','letter-spacing':'0.08em'}));
  svg.appendChild(txt(leadX,leadY+58,(100-s.weightTrail)+'%',{'font-family':'DM Mono,monospace','font-size':11,
    fill:'#1E4D33','font-weight':'700','text-anchor':'middle'}));

  // BALL — on the target line, x interpolated between trail & lead foot by ballPos
  const t=s.ballPos/100;
  const ballX=trailX+(leadX-trailX)*t;
  // tee
  if(s.tee){
    svg.appendChild(el('line',{x1:ballX,y1:lineY,x2:ballX,y2:lineY+12,stroke:'#E8823A','stroke-width':2.5,'stroke-linecap':'round'}));
  }
  // ball shadow + ball
  svg.appendChild(el('ellipse',{cx:ballX,cy:lineY+2,rx:9,ry:4,fill:'rgba(0,0,0,0.14)'}));
  svg.appendChild(el('circle',{cx:ballX,cy:lineY,r:9,fill:'#fff',stroke:'#cfcfcf','stroke-width':1}));
  svg.appendChild(el('circle',{cx:ballX-2,cy:lineY-2,r:2,fill:'rgba(0,0,0,0.05)'}));

  // ball-position callout
  svg.appendChild(el('line',{x1:ballX,y1:lineY-9,x2:ballX,y2:lineY-30,stroke:'#C9931F','stroke-width':1.5,'stroke-dasharray':'3 2'}));
  const lblW=s.s_ball.length*6.2+16;
  const lblX=Math.max(6,Math.min(W-lblW-6,ballX-lblW/2));
  svg.appendChild(el('rect',{x:lblX,y:lineY-46,width:lblW,height:17,rx:4,fill:'#E8B33D'}));
  svg.appendChild(txt(lblX+lblW/2,lineY-34,s.s_ball,{'font-family':'DM Mono,monospace','font-size':10,
    fill:'#143524','text-anchor':'middle','font-weight':'600'}));

  // STANCE WIDTH dimension (below feet)
  const dimY=Math.max(leadY,trailY)+70;
  svg.appendChild(el('line',{x1:trailX,y1:dimY,x2:leadX,y2:dimY,stroke:'#3E7A52','stroke-width':1.5}));
  svg.appendChild(el('line',{x1:trailX,y1:dimY-5,x2:trailX,y2:dimY+5,stroke:'#3E7A52','stroke-width':1.5}));
  svg.appendChild(el('line',{x1:leadX,y1:dimY-5,x2:leadX,y2:dimY+5,stroke:'#3E7A52','stroke-width':1.5}));
  svg.appendChild(txt(cx,dimY-6,'STANCE WIDTH',{'font-family':'DM Mono,monospace','font-size':9,
    fill:'#266a43','text-anchor':'middle','letter-spacing':'0.1em'}));

  // STATUS LABELS (top center) — stacked: stance/shape, flight, lie
  let topLabels=[];
  if(s.shapeLabel) topLabels.push(hw(s.shapeLabel));
  else if(open>10) topLabels.push('OPEN STANCE');
  else if(open<-6) topLabels.push('CLOSED STANCE');
  if(s.trajLabel) topLabels.push(s.trajLabel);
  if(s.slopeLabel) topLabels.push(hw(s.slopeLabel));
  topLabels.forEach((lbl,i)=>{
    svg.appendChild(txt(cx,22+i*15,lbl,{'font-family':'DM Mono,monospace','font-size':10,
      fill:'#C9931F','text-anchor':'middle','letter-spacing':'0.1em','font-weight':'600'}));
  });

  // ---- SPINE TILT INDICATOR (top-right inset) ----
  drawSpineGauge(svg, 332, 78, s.spineTilt, sideSign);
}

/* Small inclinometer-style gauge showing spine lean direction at address.
   spineTilt < 0 = tilt AWAY from target; > 0 = lean TOWARD target; 0 = neutral.
   sideSign sets which screen-direction "toward target" is (handedness). */
function drawSpineGauge(svg,gx,gy,tilt,sideSign){
  const g=el('g',{});
  // panel
  g.appendChild(el('rect',{x:gx-44,y:gy-30,width:88,height:62,rx:7,fill:'rgba(255,255,255,0.85)',stroke:'rgba(20,53,36,0.18)','stroke-width':1}));
  g.appendChild(txt(gx,gy-19,'SPINE TILT',{'font-family':'DM Mono,monospace','font-size':8,
    fill:'#266a43','text-anchor':'middle','letter-spacing':'0.12em'}));
  // ground baseline
  g.appendChild(el('line',{x1:gx-26,y1:gy+14,x2:gx+26,y2:gy+14,stroke:'#9aa79c','stroke-width':1.5}));
  const px=gx, py=gy+14;
  // "toward target" is the lead side (sideSign). Lean toward target for tilt>0,
  // away (opposite of lead side) for tilt<0.
  const ang = tilt * 1.3 * sideSign;        // degrees
  const rad=ang*Math.PI/180, len=26;
  const tx=px+Math.sin(rad)*len, ty=py-Math.cos(rad)*len;
  g.appendChild(el('line',{x1:px,y1:py,x2:px,y2:py-len,stroke:'#c7cfc8','stroke-width':1,'stroke-dasharray':'2 2'}));
  g.appendChild(el('line',{x1:px,y1:py,x2:tx,y2:ty,stroke:'#C9931F','stroke-width':3,'stroke-linecap':'round'}));
  g.appendChild(el('circle',{cx:tx,cy:ty-2,r:4,fill:'#1E4D33'}));
  g.appendChild(el('circle',{cx:px,cy:py,r:3,fill:'#1E4D33'}));
  const arrowTo = sideSign<0 ? '◂' : '▸';
  const arrowAway = sideSign<0 ? '▸' : '◂';
  let cap = Math.abs(tilt)<3 ? 'Neutral' : (tilt<0 ? 'Away '+arrowAway : arrowTo+' Toward');
  g.appendChild(txt(gx,gy+27,cap,{'font-family':'DM Mono,monospace','font-size':8.5,
    fill:'#143524','text-anchor':'middle','font-weight':'600'}));
}

/* ============ SLOPE / LIE PROFILE INSET ============ */
/* A clear side schematic shown only when a slope/lie is selected.
   updown = uphill/downhill (viewed down the target line);
   cross  = ball above / below feet (cross-slope, ball drawn at its true height). */
function drawSlope(s){
  const svg=document.getElementById('svg-slope');
  const p=s.slopeProfile;
  if(!p){ svg.style.display='none'; svg.innerHTML=''; return; }
  svg.style.display='block'; svg.innerHTML='';
  const W=400,H=170,cx=200;
  const sideSign=(hand==='R')?-1:1;        // target/lead side on screen (−1 = left)

  // panel
  svg.appendChild(el('rect',{x:0,y:0,width:W,height:H,fill:'#eef5ec'}));
  svg.appendChild(txt(14,20,p.name.toUpperCase(),{'font-family':'Barlow Condensed,sans-serif','font-size':15,
    fill:'#1E4D33','font-weight':'700','letter-spacing':'0.04em'}));
  svg.appendChild(txt(W-14,20,'SIDE VIEW',{'font-family':'DM Mono,monospace','font-size':8,
    fill:'#266a43','text-anchor':'end','letter-spacing':'0.12em'}));

  // stick golfer drawn standing along a given "up" unit vector from a hip point
  function golfer(hipx,hipy,ux,uy,footL,footR){
    const torso=30, head=12, legW=4;
    const shx=hipx+ux*torso, shy=hipy+uy*torso;          // shoulders
    const hx=shx+ux*head, hy=shy+uy*head;                // head center
    // legs
    svg.appendChild(el('line',{x1:hipx,y1:hipy,x2:footL[0],y2:footL[1],stroke:'#2D5A3D','stroke-width':legW,'stroke-linecap':'round'}));
    svg.appendChild(el('line',{x1:hipx,y1:hipy,x2:footR[0],y2:footR[1],stroke:'#2D5A3D','stroke-width':legW,'stroke-linecap':'round'}));
    // torso
    svg.appendChild(el('line',{x1:hipx,y1:hipy,x2:shx,y2:shy,stroke:'#1E4D33','stroke-width':6,'stroke-linecap':'round'}));
    // shoulder bar (perpendicular to spine) to show shoulder tilt
    const px=-uy, py=ux;                                  // perpendicular
    svg.appendChild(el('line',{x1:shx-px*12,y1:shy-py*12,x2:shx+px*12,y2:shy+py*12,stroke:'#1E4D33','stroke-width':4,'stroke-linecap':'round'}));
    // head
    svg.appendChild(el('circle',{cx:hx,cy:hy,r:8,fill:'#1E4D33'}));
    return {shx,shy};
  }

  if(p.profile==='updown'){
    // Down-the-line side profile. Target on the lead side; slope tilts toward target.
    const baseY=112, rise=30;
    const leadX = sideSign<0 ? 92 : 308;     // target/lead side
    const trailX= sideSign<0 ? 308 : 92;
    // uphill: lead foot HIGH (smaller y); downhill: lead foot LOW (larger y)
    const leadY  = baseY + (p.up ? -rise : +rise);
    const trailY = baseY + (p.up ? +rise : -rise);
    // ground
    svg.appendChild(el('path',{d:`M${leadX},${leadY} L${trailX},${trailY} L${trailX},${H} L${leadX},${H} Z`,fill:'#cfe6cf'}));
    svg.appendChild(el('line',{x1:leadX,y1:leadY,x2:trailX,y2:trailY,stroke:'#3E7A52','stroke-width':3,'stroke-linecap':'round'}));
    const gY=(x)=> leadY + (x-leadX)/(trailX-leadX)*(trailY-leadY);
    for(let i=0;i<=12;i++){const xx=leadX+(trailX-leadX)*i/12, yy=gY(xx);
      svg.appendChild(el('line',{x1:xx,y1:yy,x2:xx,y2:yy+8,stroke:'#9cc39c','stroke-width':1}));}
    // target arrow up the slope toward lead side
    svg.appendChild(el('line',{x1:cx,y1:34,x2:leadX+sideSign*-6,y2:leadY-26,stroke:'#143524','stroke-width':1.5,'stroke-dasharray':'4 3'}));
    svg.appendChild(txt(leadX,leadY-30,'TARGET',{'font-family':'DM Mono,monospace','font-size':8,fill:'#143524','text-anchor':'middle'}));

    // feet straddle centre; spine PERPENDICULAR to slope (shoulders parallel to hill)
    const fLeadX=cx+sideSign*22, fTrailX=cx-sideSign*22;
    const fLeadY=gY(fLeadX), fTrailY=gY(fTrailX);
    // up-normal (perpendicular to slope, pointing up the screen)
    let nx=-(trailY-leadY), ny=(trailX-leadX);           // rotate slope vec +90
    const nlen=Math.hypot(nx,ny); nx/=nlen; ny/=nlen;
    if(ny>0){ nx=-nx; ny=-ny; }                          // ensure it points up
    const footMidX=(fLeadX+fTrailX)/2, footMidY=(fLeadY+fTrailY)/2;
    const hipLen=30, hipx=footMidX+nx*hipLen, hipy=footMidY+ny*hipLen;
    golfer(hipx,hipy,nx,ny,[fLeadX,fLeadY],[fTrailX,fTrailY]);

    // weight ring on the LOW foot (larger y)
    const lowF = fLeadY>fTrailY ? [fLeadX,fLeadY] : [fTrailX,fTrailY];
    svg.appendChild(el('circle',{cx:lowF[0],cy:lowF[1]+3,r:8,fill:'none',stroke:'#C9931F','stroke-width':2.5}));
    svg.appendChild(txt(lowF[0],lowF[1]+24,'weight on low foot',{'font-family':'DM Mono,monospace','font-size':8,fill:'#C9931F','text-anchor':'middle','font-weight':'600'}));
    // ball toward the HIGH foot
    const highX = fLeadY<fTrailY ? fLeadX : fTrailX;
    svg.appendChild(el('circle',{cx:highX,cy:gY(highX)-5,r:5,fill:'#fff',stroke:'#bbb'}));

    svg.appendChild(txt(14,H-12,hw(p.club+' · '+p.aim),{'font-family':'DM Mono,monospace','font-size':9,fill:'#143524','font-weight':'600'}));
    svg.appendChild(txt(W-14,H-12,'Shoulders match the slope',{'font-family':'DM Mono,monospace','font-size':8.5,fill:'#266a43','text-anchor':'end'}));
  }

  if(p.profile==='cross'){
    // Cross-slope facing the golfer. Ground tilts; ball sits at its TRUE height
    // (above the feet for "Ball Above", below for "Ball Below").
    const above=(p.dir==='above');
    const gx=150, footY=120, bx=270, drop=34;
    // ground line: ball side higher (above) or lower (below) than the stance
    const standY=footY;
    const ballGroundY = above ? footY-drop : footY+drop;
    const lX=70, rX=330;
    const lY = standY + (ballGroundY-standY)*(lX-gx)/(bx-gx);
    const rY = standY + (ballGroundY-standY)*(rX-gx)/(bx-gx);
    svg.appendChild(el('path',{d:`M${lX},${lY} L${rX},${rY} L${rX},${H} L${lX},${H} Z`,fill:'#cfe6cf'}));
    svg.appendChild(el('line',{x1:lX,y1:lY,x2:rX,y2:rY,stroke:'#3E7A52','stroke-width':3,'stroke-linecap':'round'}));
    const gY=(x)=> lY + (x-lX)/(rX-lX)*(rY-lY);
    for(let i=0;i<=12;i++){const xx=lX+(rX-lX)*i/12, yy=gY(xx);
      svg.appendChild(el('line',{x1:xx,y1:yy,x2:xx,y2:yy+8,stroke:'#9cc39c','stroke-width':1}));}

    // golfer stands vertical at gx. Above → tall (less bend); Below → sit down (more bend)
    const legLen = above ? 40 : 30;          // below: shorter legs look = more knee flex/lower
    const hipx=gx, hipy=gY(gx)-legLen;
    // feet slightly apart
    const fL=[gx-12,gY(gx-12)], fR=[gx+12,gY(gx+12)];
    golfer(hipx,hipy,0,-1,fL,fR);            // up = straight vertical
    // knee-flex tick for "below"
    if(!above){ svg.appendChild(txt(gx-30,hipy+18,'more flex',{'font-family':'DM Mono,monospace','font-size':7.5,fill:'#266a43','text-anchor':'middle'})); }

    // arms reach out to the ball at its true height
    const shY=hipy-30;
    const by=gY(bx) - 5;
    svg.appendChild(el('line',{x1:hipx,y1:shY+4,x2:bx,y2:by,stroke:'#3E7A52','stroke-width':3,'stroke-linecap':'round'}));
    svg.appendChild(el('circle',{cx:bx,cy:by,r:5,fill:'#fff',stroke:'#bbb'}));
    // height reference: dashed line from feet level across to ball
    svg.appendChild(el('line',{x1:gx,y1:gY(gx),x2:bx,y2:gY(gx),stroke:'#C9931F','stroke-width':1,'stroke-dasharray':'3 2',opacity:0.6}));
    svg.appendChild(el('line',{x1:bx,y1:gY(gx),x2:bx,y2:by,stroke:'#C9931F','stroke-width':1,'stroke-dasharray':'3 2',opacity:0.8}));
    svg.appendChild(txt(bx+8, (gY(gx)+by)/2, above?'ball higher':'ball lower',
      {'font-family':'DM Mono,monospace','font-size':7.5,fill:'#C9931F','font-weight':'600'}));

    // weight cue
    svg.appendChild(txt(gx,gY(gx)+22, above?'weight → toes':'weight → heels',
      {'font-family':'DM Mono,monospace','font-size':8.5,fill:'#C9931F','text-anchor':'middle','font-weight':'600'}));

    svg.appendChild(txt(14,H-12,hw(p.club+' · '+p.aim),{'font-family':'DM Mono,monospace','font-size':9,fill:'#143524','font-weight':'600'}));
    svg.appendChild(txt(W-14,H-12, above?'Stand tall, swing flatter':'Sit down, swing steeper',
      {'font-family':'DM Mono,monospace','font-size':8.5,fill:'#266a43','text-anchor':'end'}));
  }
}


/* ============ RENDER ============ */
function render(){
  const base=SHOTS[idx];
  const s=effShot();   // base merged with active shape/flight/lie

  // pills
  document.querySelectorAll('.pill').forEach((p,i)=>p.classList.toggle('on',i===idx));
  const activePill=document.querySelectorAll('.pill')[idx];
  if(activePill) activePill.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});

  document.getElementById('cat').textContent=base.cat;
  document.getElementById('title').textContent=base.title;
  document.getElementById('desc').textContent=base.desc;

  // ---- control rows: show only when relevant, reflect active state ----
  const rowShape=document.getElementById('row-shape');
  if(base.shapeable){ rowShape.classList.remove('hidden');
    document.getElementById('sh-straight').classList.toggle('on',shape==='straight');
    document.getElementById('sh-draw').classList.toggle('on',shape==='draw');
    document.getElementById('sh-fade').classList.toggle('on',shape==='fade');
  } else rowShape.classList.add('hidden');

  const rowTraj=document.getElementById('row-traj');
  if(base.trajable){ rowTraj.classList.remove('hidden');
    document.getElementById('tr-normal').classList.toggle('on',traj==='normal');
    document.getElementById('tr-low').classList.toggle('on',traj==='low');
    document.getElementById('tr-high').classList.toggle('on',traj==='high');
  } else rowTraj.classList.add('hidden');

  const rowSlope=document.getElementById('row-slope');
  if(base.slopeable){ rowSlope.classList.remove('hidden');
    ['flat','uphill','downhill','above','below'].forEach(k=>
      document.getElementById('sl-'+k).classList.toggle('on',slope===k));
  } else rowSlope.classList.add('hidden');

  // ---- specs ----
  document.getElementById('s-width').textContent=s.s_width;
  document.getElementById('s-ball').textContent=s.s_ball;
  document.getElementById('s-attack').textContent=s.s_attack;
  document.getElementById('s-tilt').textContent=hw(s.s_tilt);

  // weight text + bar — lead first (left), matching the top-down layout
  const lead=100-s.weightTrail;
  document.getElementById('s-weight').textContent=`${lead}% Lead · ${s.weightTrail}% Trail`;
  document.getElementById('wbar-fill').style.width=lead+'%';
  // weight-bar end labels follow handedness (which side the target is on)
  document.getElementById('wl-left').textContent = hand==='R' ? '◂ target · LEAD' : 'LEAD · target ▸';
  document.getElementById('wl-right').textContent = 'TRAIL';

  document.getElementById('think').textContent=hw(s.think);

  // grip + pressure
  document.getElementById('s-grip').textContent=s.gripEff;
  const press=s.gripPressureEff;
  document.getElementById('pbar-fill').style.left=((press-1)/9*100)+'%';
  const word = press<=3 ? 'Light' : (press<=6 ? 'Medium' : 'Firm');
  document.getElementById('p-val').textContent=`${press}/10 · ${word}`;

  document.getElementById('prev').disabled=(idx===0);
  document.getElementById('next').disabled=(idx===SHOTS.length-1);

  drawTop(s);
  drawSlope(s);
}

/* swipe support on the diagram */
let touchX=null;
document.querySelector('.stage').addEventListener('touchstart',e=>{touchX=e.touches[0].clientX;},{passive:true});
document.querySelector('.stage').addEventListener('touchend',e=>{
  if(touchX===null)return;
  const dx=e.changedTouches[0].clientX-touchX;
  if(Math.abs(dx)>50) step(dx<0?1:-1);
  touchX=null;
},{passive:true});

render();
</script>
